worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/x-font-ttf image/svg+xml;
    gzip_min_length 1024;

    # Docker iç DNS — lazy resolve (container sırası önemsiz)
    resolver 127.0.0.11 valid=30s ipv6=off;

    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection        "";
    proxy_read_timeout 120s;

    server {
        listen 80;
        server_name _;

        # ── Backend API (/api/auth/login → backend:8080/api/auth/login) ──────
        location /api/ {
            set $backend http://backend:8080;
            proxy_pass $backend;
        }

        # ── Swagger UI ────────────────────────────────────────────────────────
        location /swagger-ui/ {
            set $backend http://backend:8080;
            proxy_pass $backend;
        }
        location /v3/api-docs {
            set $backend http://backend:8080;
            proxy_pass $backend;
        }
        location /api-docs {
            set $backend http://backend:8080;
            proxy_pass $backend;
        }

        # ── Spring Actuator ───────────────────────────────────────────────────
        location /actuator/ {
            set $backend http://backend:8080;
            proxy_pass $backend;
        }

        # ── Grafana — http://localhost/grafana/ ───────────────────────────────
        # Grafana GF_SERVER_SERVE_FROM_SUB_PATH=true ile /grafana/ prefix'ini kendisi yönetir
        location /grafana/ {
            set $grafana http://grafana:3001;
            proxy_pass $grafana;
        }

        # ── Prometheus — http://localhost/prometheus/ ─────────────────────────
        location /prometheus/ {
            set $prometheus http://prometheus:9090;
            proxy_pass $prometheus;
        }

        # ── React Frontend (her şey) ──────────────────────────────────────────
        location / {
            set $frontend http://frontend:80;
            proxy_pass $frontend;
        }
    }
}
