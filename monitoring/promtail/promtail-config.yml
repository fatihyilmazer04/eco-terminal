server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Docker container loglarını otomatik keşfet
  - job_name: docker-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 10s
        filters:
          # Sadece eco-terminal compose projesindeki container'ları al
          - name: label
            values: ["com.docker.compose.project=eco-terminal"]
    relabel_configs:
      # Container adını label olarak ekle
      - source_labels: [__meta_docker_container_name]
        regex: /(.*)
        target_label: container_name

      # Compose servis adını label olarak ekle
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: compose_service

      # Compose proje adını ekle (dashboard filtresi için)
      - source_labels: [__meta_docker_container_label_com_docker_compose_project]
        target_label: compose_project

      # Log stream'i container adına göre ayırt et
      - source_labels: [__meta_docker_container_name]
        target_label: __path__
        regex: /(.*)
        replacement: /var/lib/docker/containers/*/*-json.log

    pipeline_stages:
      # JSON formatındaki Docker log satırlarını parse et
      - json:
          expressions:
            log: log
            stream: stream
            time: time
      # Ham log içeriğini çıkar
      - output:
          source: log
      # Zaman damgasını parse et
      - timestamp:
          source: time
          format: RFC3339Nano

      # Log seviyesini çıkar (Spring Boot, Python her ikisini kapsar)
      - regex:
          expression: '(?i)(ERROR|WARN|INFO|DEBUG)'
          source: log
      - labels:
          level:
