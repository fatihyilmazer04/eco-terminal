spring:
  application:
    name: eco-terminal-backend

  # ── Datasource ──────────────────────────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ecoterminal}
    username: ${DB_USER:ecoterminal}
    password: ${DB_PASSWORD:ecoterminal123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000

  # ── JPA / Hibernate ─────────────────────────────────────────────────────────
  jpa:
    hibernate:
      # Flyway şemayı yönetiyor; Hibernate sadece doğruluyor (production-safe)
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC

  # ── Redis (Rate Limiting + Cache) ───────────────────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  # ── Multipart (Request boyut limiti) ────────────────────────────────────────
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  # ── Flyway ──────────────────────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

# ── Resend Email API ─────────────────────────────────────────────────────────
resend:
  api-key: ${RESEND_API_KEY:}
  from: ${MAIL_FROM:noreply@ecoterminal.com}

# ── JWT ─────────────────────────────────────────────────────────────────────
jwt:
  # Üretimde mutlaka güçlü, rastgele 256-bit Base64 secret kullanın
  secret: ${JWT_SECRET:eco-terminal-super-secret-key-must-be-at-least-256-bits-long-for-hs256}
  access-token-expiration: 900000        # 15 dakika (ms)
  refresh-token-expiration: 604800000    # 7 gün (ms)

# ── CORS ────────────────────────────────────────────────────────────────────
cors:
  # Virgülle ayrılmış origin listesi. Glob pattern desteklenir (setAllowedOriginPatterns).
  # http://192.168.*.*:* → LAN'daki herhangi bir cihazdan erişime izin verir (dev ortamı)
  allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:3000,http://192.168.*.*:*}

# ── AI Service ──────────────────────────────────────────────────────────────
ai-service:
  base-url: ${AI_SERVICE_URL:http://localhost:5000}

# ── YOLOv8 Service ──────────────────────────────────────────────────────────
yolov8-service:
  base-url: ${YOLO_SERVICE_URL:http://yolov8-service:5001}

# ── Server ──────────────────────────────────────────────────────────────────
server:
  port: ${PORT:8080}
  servlet:
    context-path: /
  tomcat:
    max-http-form-post-size: 10MB

# ── Actuator ────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

# ── Loglama ─────────────────────────────────────────────────────────────────
logging:
  level:
    com.ecoterminal: DEBUG
    org.springframework.security: INFO
    org.flywaydb: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# ── Scheduling (Faz 5-6 için) ───────────────────────────────────────────────
spring.task.scheduling:
  pool:
    size: 4

# ── Mail Modu ────────────────────────────────────────────────────────────────
# true  → JavaMailSender ile gerçek Gmail SMTP kullan
# false → DEMO MODU: kod sadece backend log'una yazılır, mail gönderilmez
app:
  mail:
    enabled: ${MAIL_ENABLED:false}

  # ── Internal Service Token ──────────────────────────────────────────────────
  # llm-service bu token'ı X-Internal-Token header'ında gönderir.
  # Üretimde güçlü bir random string kullanın (openssl rand -hex 32).
  internal:
    token: ${LLM_SERVICE_INTERNAL_TOKEN:default-dev-token}

  # ── Demo Modu — Sabit Heatmap ───────────────────────────────────────────────
  # true  → DemoOccupancyProvider sabit değerleri kullanılır, simülatör devre dışı
  # false → Canlı DB okumaları kullanılır (Manuel görüntü analizi akışı)
  demo:
    fixed-heatmap: false

  # ── Chatbot / LLM ──────────────────────────────────────────────────────────
  chatbot:
    default-provider: llm-service    # "cloud" | "local" | "llm-service"
    gemini:
      api-key: ${GEMINI_API_KEY:}    # Google AI Studio'dan alınan API anahtarı
      model: gemini-pro              # gemini-pro | gemini-1.5-flash | gemini-2.0-flash
    llm-service:
      url: ${LLM_SERVICE_URL:http://llm-service:5002}  # FastAPI RAG servisi

# ── Demo Veri Tazeleme ────────────────────────────────────────────────────────
# false yapılınca DemoDataRefresher çalışmaz (production ortamı için)
demo:
  refresh-flights: true

# ── Swagger / OpenAPI (Faz 8) ────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
  info:
    title: Eco-Terminal API
    description: Akıllı Havalimanı Yoğunluk ve Enerji Yönetim Sistemi
    version: 1.0.0
