server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Docker iç DNS — upstream'ler lazy resolve edilir (container sırası önemsiz)
    resolver 127.0.0.11 valid=30s ipv6=off;

    # index.html — asla önbellekleme (SPA entry point, her deploy'da güncel olmalı)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # React Router — tüm 404'ler index.html'e düşer (SPA routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API isteklerini backend'e proxy et
    # BACKEND_URL — container başlarken docker-entrypoint.sh tarafından envsubst ile doldurulur
    location /api/ {
        set $backend_url ${BACKEND_URL};
        proxy_pass $backend_url/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
    }

    # YOLOv8 servisine proxy
    # YOLO_URL — container başlarken docker-entrypoint.sh tarafından envsubst ile doldurulur
    location /yolo/ {
        set $yolo_url ${YOLO_URL};
        proxy_pass $yolo_url/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
    }

    # Statik dosyalar için cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Gzip sıkıştırma
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
