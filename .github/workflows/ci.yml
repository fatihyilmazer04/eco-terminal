name: Eco-Terminal CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  # ── 1. Backend Unit Tests (DB gerektirmez, hızlı) ──────────────────────────
  backend-unit-tests:
    name: Backend Unit Tests (Java 21)
    runs-on: ubuntu-latest
    # Sadece Mockito tabanlı testler — PostgreSQL/Redis servisi gerekmez

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Run unit tests
        working-directory: ./backend
        run: |
          mvn test -Dspring.profiles.active=test \
            -Dsurefire.excludes="**/*IntegrationTest*"
        env:
          JWT_SECRET: test_secret_key_minimum_32_characters_long_for_ci_pipeline

      - name: Upload unit test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-unit-test-reports
          path: backend/target/surefire-reports/

  # ── 2. Backend Integration Tests (PostgreSQL gerektirir) ───────────────────
  backend-test:
    name: Backend Integration Tests (Java 21)
    runs-on: ubuntu-latest
    needs: [backend-unit-tests]

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: ecoterminal_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test123
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Run integration tests
        working-directory: ./backend
        run: mvn test -Dspring.profiles.active=test
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/ecoterminal_test
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: test123
          JWT_SECRET: test_secret_key_minimum_32_characters_long_for_ci_pipeline

      - name: Upload integration test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-integration-test-reports
          path: backend/target/surefire-reports/

  # ── 3. Frontend Build + Test ───────────────────────────────────────────────
  frontend-test:
    name: Frontend Tests (Node 20)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache npm dependencies
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run tests
        working-directory: ./frontend
        run: npm run test

      - name: Build check
        working-directory: ./frontend
        run: npm run build

  # ── 4. Security Scan ───────────────────────────────────────────────────────
  security-scan:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    needs: [backend-test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'eco-terminal'
          path: './backend'
          format: 'HTML'
          args: '--enableRetired --failOnCVSS 11'

      - name: Upload dependency check report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-check-report
          path: reports/

  # ── 5. Docker Build Validation ─────────────────────────────────────────────
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [backend-unit-tests, backend-test, frontend-test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: eco-terminal-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: eco-terminal-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build AI service image
        uses: docker/build-push-action@v5
        with:
          context: ./ai-service
          push: false
          tags: eco-terminal-ai:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
