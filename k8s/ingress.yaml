# Gereksinim: nginx ingress controller
# minikube: minikube addons enable ingress
# kind:      kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/main/deploy/static/provider/kind/deploy.yaml

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: eco-terminal-ingress
  labels:
    app.kubernetes.io/part-of: eco-terminal
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          # /api/* → Spring Boot backend
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8080

          # /actuator/* → Spring Boot actuator (health check için)
          - path: /actuator
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8080

          # /swagger-ui ve /api-docs → Swagger UI
          - path: /swagger-ui
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8080

          - path: /api-docs
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8080

          # /* → React SPA (frontend nginx — SPA fallback /index.html)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
