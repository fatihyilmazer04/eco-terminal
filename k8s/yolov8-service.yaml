apiVersion: apps/v1
kind: Deployment
metadata:
  name: yolov8-service
  labels:
    app: yolov8-service
    app.kubernetes.io/part-of: eco-terminal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: yolov8-service
  template:
    metadata:
      labels:
        app: yolov8-service
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres 5432; do
                echo "Postgres bekleniyor..."; sleep 3;
              done
        - name: wait-for-ai-service
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z ai-service 5000; do
                echo "AI servis bekleniyor..."; sleep 5;
              done
      containers:
        - name: yolov8-service
          image: eco-terminal-yolov8:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5001
          env:
            # YOLOv8 servisi farklı env var adları kullanıyor
            - name: POSTGRES_HOST
              valueFrom:
                configMapKeyRef:
                  name: eco-terminal-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: eco-terminal-config
                  key: DB_PORT
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: eco-terminal-config
                  key: DB_NAME
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: eco-terminal-config
                  key: DB_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: eco-terminal-secret
                  key: POSTGRES_PASSWORD
            - name: AI_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: eco-terminal-config
                  key: AI_SERVICE_URL
            - name: FLASK_ENV
              valueFrom:
                configMapKeyRef:
                  name: eco-terminal-config
                  key: FLASK_ENV
          livenessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 40
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: yolov8-service
  labels:
    app: yolov8-service
    app.kubernetes.io/part-of: eco-terminal
spec:
  type: ClusterIP
  selector:
    app: yolov8-service
  ports:
    - port: 5001
      targetPort: 5001
